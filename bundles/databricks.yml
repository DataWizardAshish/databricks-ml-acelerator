# Databricks Asset Bundle — ML Accelerator
# Generated artifacts (notebooks + jobs) are deployed via this bundle.
# Teams override variables per target; secrets are never stored here.
#
# Deploy:  databricks bundle deploy --target dev
# Run:     databricks bundle run feature_pipeline_job --target dev

bundle:
  name: databricks-ml-accelerator

variables:
  catalog:
    description: Unity Catalog catalog name
    default: dbw_vectoflow_dev

  schema:
    description: UC schema where ML artifacts are written
    default: ml_accelerator

  cluster_id:
    description: All-purpose cluster ID for notebook execution
    default: 0402-042550-3eto1bj6

  use_case_name:
    description: Slug for the approved ML use case (set by agent at generation time)
    default: ""

targets:
  dev:
    mode: development
    workspace:
      host: https://adb-7405615862244533.13.azuredatabricks.net
    variables:
      catalog: dbw_vectoflow_dev
      schema: ml_accelerator

  prod:
    mode: production
    workspace:
      host: ${var.workspace_host}   # override at deploy time
    variables:
      catalog: ${var.catalog}
      schema: ml_accelerator

# Resources are generated by the agent into resources/jobs/
# and referenced here. Placeholder until Phase 2 generates them.
resources:
  jobs: {}
